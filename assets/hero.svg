<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09131F"/>
      <stop offset="1" stop-color="#13263A"/>
    </linearGradient>
    <linearGradient id="panel" x1="168" y1="112" x2="1112" y2="528" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10243B"/>
      <stop offset="1" stop-color="#0D1B2B"/>
    </linearGradient>
    <linearGradient id="accent" x1="212" y1="160" x2="1068" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7BE0FF"/>
      <stop offset="0.55" stop-color="#35B5FF"/>
      <stop offset="1" stop-color="#B8FFB0"/>
    </linearGradient>
    <filter id="glow" x="138" y="82" width="1004" height="476" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="18" result="effect1_foregroundBlur"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1110" cy="118" r="160" fill="#113B5A" fill-opacity="0.3"/>
  <circle cx="214" cy="542" r="210" fill="#0A4268" fill-opacity="0.25"/>

  <g filter="url(#glow)">
    <rect x="168" y="112" width="944" height="416" rx="28" fill="url(#panel)" stroke="#2D577A" stroke-width="2"/>
  </g>

  <rect x="212" y="160" width="310" height="18" rx="9" fill="url(#accent)" fill-opacity="0.9"/>
  <text x="212" y="246" fill="#F2F8FF" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">TurboQuant Llama Lab</text>
  <text x="212" y="292" fill="#9EC2DA" font-family="Segoe UI, Arial, sans-serif" font-size="26">Portable TurboQuant core, benchmark tooling,</text>
  <text x="212" y="326" fill="#9EC2DA" font-family="Segoe UI, Arial, sans-serif" font-size="26">and reviewable llama.cpp integration patches.</text>

  <rect x="212" y="382" width="186" height="48" rx="24" fill="#102C44" stroke="#2D6D9B"/>
  <text x="244" y="412" fill="#D8EEFF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Long Context</text>

  <rect x="418" y="382" width="180" height="48" rx="24" fill="#102C44" stroke="#2D6D9B"/>
  <text x="450" y="412" fill="#D8EEFF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">CUDA Lab</text>

  <rect x="618" y="382" width="188" height="48" rx="24" fill="#102C44" stroke="#2D6D9B"/>
  <text x="650" y="412" fill="#D8EEFF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Patch Export</text>

  <rect x="864" y="186" width="182" height="92" rx="18" fill="#0C2133" stroke="#245579"/>
  <text x="892" y="220" fill="#90E5FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Portable Core</text>
  <text x="892" y="250" fill="#C9E2F2" font-family="Segoe UI, Arial, sans-serif" font-size="16">Rotation</text>
  <text x="892" y="272" fill="#C9E2F2" font-family="Segoe UI, Arial, sans-serif" font-size="16">Lloyd-Max</text>

  <rect x="864" y="298" width="182" height="92" rx="18" fill="#0C2133" stroke="#245579"/>
  <text x="892" y="332" fill="#90E5FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Validation</text>
  <text x="892" y="362" fill="#C9E2F2" font-family="Segoe UI, Arial, sans-serif" font-size="16">Bench + CLI checks</text>

  <rect x="864" y="410" width="182" height="92" rx="18" fill="#0C2133" stroke="#245579"/>
  <text x="892" y="444" fill="#90E5FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Patches</text>
  <text x="892" y="474" fill="#C9E2F2" font-family="Segoe UI, Arial, sans-serif" font-size="16">Reviewable patch sets</text>
</svg>
